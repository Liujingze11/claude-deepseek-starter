<div class="section">
<h3>设计要点</h3>
<ul>
  <li><strong>启动器</strong>：深灰黑底 (#0f172a) + 青蓝 CLAUDE (#4fc3f7) + 浅灰 DEEPSEEK (#94a3b8)，沉稳专业</li>
  <li><strong>安装器</strong>：深蓝底 (#1a237e) + 右下角橙色 INST 小标签，一眼能区分"这是安装用的"</li>
  <li><strong>小尺寸可读性</strong>：文字图标在 16px 会糊，需要用简化的首字母变体（下一屏确认小图标方案）</li>
</ul>
