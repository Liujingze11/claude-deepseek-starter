<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="hex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle glow rings -->
  <circle cx="256" cy="256" r="152" fill="none" stroke="#312e81" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="256" r="142" fill="none" stroke="#312e81" stroke-width="1" opacity="0.2"/>

  <!-- Hexagonal chip/module outline -->
  <polygon points="256,115 383,188 383,324 256,397 129,324 129,188"
           fill="none" stroke="url(#hex)" stroke-width="7" stroke-linejoin="round" opacity="0.9"/>

  <!-- Inner filled hexagon (semi-transparent) -->
  <polygon points="256,135 368,200 368,312 256,377 144,312 144,200"
           fill="#7c3aed" opacity="0.15"/>

  <!-- Plus sign (install/add symbol) -->
  <rect x="244" y="190" width="24" height="132" rx="6" fill="#a78bfa"/>
  <rect x="190" y="244" width="132" height="24" rx="6" fill="#a78bfa"/>

  <!-- Connection dots -->
  <circle cx="256" cy="115" r="7" fill="#c4b5fd"/>
  <circle cx="383" cy="188" r="5" fill="#a78bfa" opacity="0.7"/>
  <circle cx="129" cy="188" r="5" fill="#a78bfa" opacity="0.7"/>
</svg>
