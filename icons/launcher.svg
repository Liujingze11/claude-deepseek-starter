<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle glow rings -->
  <circle cx="256" cy="256" r="152" fill="none" stroke="#1e3a5f" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="256" r="142" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.25"/>

  <!-- Crystal diamond — 4 triangular facets -->
  <!-- Top (brightest, catching light) -->
  <polygon points="256,110 400,256 256,256" fill="#38bdf8"/>
  <!-- Right (medium) -->
  <polygon points="400,256 256,402 256,256" fill="#0ea5e9"/>
  <!-- Bottom (darkest) -->
  <polygon points="256,402 112,256 256,256" fill="#0284c7"/>
  <!-- Left (medium-dark) -->
  <polygon points="112,256 256,110 256,256" fill="#0369a1"/>

  <!-- Inner facet (offset toward light source = top-right) for 3D depth -->
  <polygon points="256,180 340,256 256,256" fill="#7dd3fc" opacity="0.55"/>
  <polygon points="340,256 256,332 256,256" fill="#38bdf8" opacity="0.35"/>
  <polygon points="256,332 172,256 256,256" fill="#0ea5e9" opacity="0.25"/>
  <polygon points="172,256 256,180 256,256" fill="#38bdf8" opacity="0.35"/>

  <!-- Center bright point -->
  <circle cx="256" cy="256" r="10" fill="#e0f2fe"/>

  <!-- Corner accent sparkles -->
  <circle cx="346" cy="160" r="5.5" fill="#7dd3fc" opacity="0.85"/>
  <circle cx="346" cy="352" r="4.5" fill="#7dd3fc" opacity="0.55"/>
  <circle cx="166" cy="352" r="4.5" fill="#7dd3fc" opacity="0.55"/>
  <circle cx="166" cy="160" r="4" fill="#7dd3fc" opacity="0.5"/>
</svg>
